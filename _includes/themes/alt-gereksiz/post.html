<article>
  <h1>
    {{ page.title }}
    {% if page.tagline %}<small>{{page.tagline}}</small>{% endif %}
  </h1>

  {% unless page.tags == empty %}
  <ul class="page_tag_box inline">
    <li><i class="icon-tags"></i></li>
    {% assign tags_list = page.tags %}
    {% include JB/tags_list %}
  </ul>
  {% endunless %}

  {{ content }}
</article>

<footer>
   <div id="date" class="meta">
      {{ page.date | date_to_string }}
   </div>

   <div id="return">
      <a href="/">&laquo; 返回博客首页</a>
   </div>
   <br>
   <!--
   <h2>Comments</h2>
   {% include JB/comments %}
   -->

<!-- 多说评论框 start -->
<div class="ds-thread" data-thread-key={{ page.url }} data-title={{ page.title }} data-url=jsrc.me/{{ page.url }}></div>
<!-- 多说评论框 end -->
<!-- 多说公共JS代码 start (一个网页只需插入一次) -->

var duoshuoQuery = {short_name:"jsrc"};
  (function() {

    ds.type = 'text/javascript';ds.async = true;
    ds.src = (document.location.protocol == 'https:' ? 'https:' : 'http:') + '//static.duoshuo.com/embed.js';

    (document.getElementsByTagName('head')[0]

<!-- 多说公共JS代码 end -->

</footer>
